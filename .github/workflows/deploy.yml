name: Deploy landing to GitHub Pages

# Static export → ./out → GitHub Pages. Triggers on push to main (or manual
# dispatch). Uses the modern Pages-from-artifact flow, not the legacy
# gh-pages branch push. CNAME + .nojekyll live in /public so they're copied
# into /out automatically by Next's static export.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time. If a newer commit lands while a deploy is in
# flight, GitHub will cancel the older run.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec next build
        env:
          # If you fork to a different repo, override this in repo secrets
          # (Settings → Secrets and variables → Actions → New variable).
          NEXT_PUBLIC_GITHUB_URL: ${{ vars.NEXT_PUBLIC_GITHUB_URL || 'https://github.com/juanfiguera/wwxd' }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
